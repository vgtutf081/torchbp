name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          USE_CUDA=0 FORCE_CUDA=0 python -m pip install --no-build-isolation -e .

      - name: Run smoke and unit tests
        run: |
          mkdir -p artifacts
          python -m unittest \
            tests.test_api_jobs \
            tests.test_job_store \
            tests.test_jobs_prepare \
            tests.test_pipeline_progress \
            tests.test_profiles \
            tests.test_output_formats \
            tests.test_validation \
            tests.test_telemetry_logging \
            tests.test_examples_smoke -v | tee artifacts/smoke.log

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: artifacts/smoke.log
          if-no-files-found: error

  regression:
    name: regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          USE_CUDA=0 FORCE_CUDA=0 python -m pip install --no-build-isolation -e .

      - name: Run regression operator tests
        run: |
          mkdir -p artifacts
          python -m unittest tests.test_torchbp -v | tee artifacts/regression.log

      - name: Upload regression artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-logs
          path: artifacts/regression.log
          if-no-files-found: error
